<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; overflow: hidden; font-family: 'Noto Sans Bengali', sans-serif; }
  .thumb {
    width: 1080px; height: 1080px;
    background: linear-gradient(160deg, #f3e6ff 0%, #ffffff 50%, #f8f0ff 100%);
    position: relative; overflow: hidden;
  }
  .circle1 { position: absolute; top: -80px; right: -80px; width: 360px; height: 360px; border-radius: 50%; background: rgba(123,45,139,0.12); }
  .circle2 { position: absolute; bottom: -100px; left: -80px; width: 420px; height: 420px; border-radius: 50%; background: rgba(123,45,139,0.08); }
  .header {
    position: absolute; top: 0; left: 0; right: 0; height: 110px;
    background: #7B2D8B;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; z-index: 10;
  }
  .channel-logo { width: 60px; height: 60px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-right: 14px; }
  .channel-left { display: flex; align-items: center; }
  .channel-name { color: #fff; font-size: 34px; font-weight: 900; }
  .follow-btn { background: rgba(255,255,255,0.18); border: 2px solid rgba(255,255,255,0.4); border-radius: 40px; padding: 8px 28px; color: #fff; font-size: 24px; font-weight: 700; }
  .title-block {
    position: absolute; top: 110px; left: 0; right: 0;
    background: rgba(255,255,255,0.97);
    border-bottom: 6px solid #7B2D8B;
    padding: 30px 50px 24px; z-index: 8;
  }
  .main-title { color: #1a1a1a; font-size: 58px; font-weight: 900; line-height: 1.25; margin-bottom: 10px; }
  .sub-title { color: #7B2D8B; font-size: 34px; font-weight: 600; }
  .center-area {
    position: absolute; top: 400px; left: 0; right: 0; bottom: 110px;
    display: flex; align-items: center; justify-content: center; z-index: 5;
  }
  .play-btn {
    width: 140px; height: 140px; border-radius: 50%;
    background: rgba(123,45,139,0.12); border: 5px solid #7B2D8B;
    display: flex; align-items: center; justify-content: center;
    font-size: 60px; color: #7B2D8B;
  }
  .progress-area {
    position: absolute; bottom: 125px; left: 50px; right: 50px;
    background: rgba(123,45,139,0.07); border: 2px solid rgba(123,45,139,0.15);
    border-radius: 20px; padding: 18px 26px; z-index: 7;
  }
  .progress-title { color: #333; font-size: 26px; font-weight: 700; margin-bottom: 10px; }
  .progress-bar-bg { background: #e0d0e8; border-radius: 10px; height: 10px; }
  .progress-bar-fill { background: #7B2D8B; border-radius: 10px; height: 10px; width: 62%; }
  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 110px;
    background: #7B2D8B;
    display: flex; align-items: center; justify-content: center; gap: 16px; z-index: 10;
  }
  .bottom-text { color: #fff; font-size: 36px; font-weight: 800; }
  .flower1 { position: absolute; top: 140px; right: 30px; font-size: 70px; opacity: 0.25; z-index: 6; }
  .flower2 { position: absolute; bottom: 130px; left: 30px; font-size: 55px; opacity: 0.2; z-index: 6; }
</style>
</head>
<body>
<div class="thumb">
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="header">
    <div class="channel-left">
      <div class="channel-logo">🌸</div>
      <span class="channel-name">অব্যকুল</span>
    </div>
    <div class="follow-btn">🌸 Follow Us</div>
  </div>
  <div class="title-block">
    <div class="main-title">বড় ভাইয়ের প্রতি ছোট ভাইয়ের ভালোবাসা</div>
    <div class="sub-title">এমন হওয়া উচিত 🌸🌸</div>
  </div>
  <div class="flower1">🌸</div>
  <div class="flower2">✨</div>
  <div class="center-area">
    <div class="play-btn">▶</div>
  </div>
  <div class="progress-area">
    <div class="progress-title">🎙️ বড় ভাইয়ের প্রতি ছোট ভাইয়ের...</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill"></div></div>
  </div>
  <div class="bottom-bar">
    <span style="font-size:42px">🎙️</span>
    <span class="bottom-text">শায়খ আহমাদুল্লাহ</span>
  </div>
</div>
</body>
</html>
